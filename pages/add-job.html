<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>
</head>
<body>
    <nav>
        <h2> JobBoard </h2>
        <a href="dashboard.html"> My Jobs </a> &nbsp;&nbsp;&nbsp;
        <a href="add-job.html"> Post a Job </a> &nbsp;&nbsp;&nbsp;
        <a href="home.html"> Logout </a>
    </nav>
    <h1> Add / Edit a Job </h1>
    <p> Company admins can use this form to add a new job or edit an existing one. </p>

    
    <!-- When the admin clicks "Add Job", the form submits the job data
    and redirects to the dashboard page.

    In next phase using JavaScript the submitted job will be saved and displayed in the dashboard job list. -->
    

    <form action="dashboard.html" method="get">
        <fieldset>

        <legend> Job Information </legend>

        <label for="job-id"> Job ID: </label>
        <input type="number" id="job-id" name="job-id" placeholder="Enter Job ID" required> <br><br>

        <label for="job-title"> Job Title: </label>
        <input type="text" id="job-title" name="job-title" placeholder="e.g. Software Engineer" required> <br><br>

        <label for="job-salary"> Salary: </label>
        <input type="number" id="job-salary" name="job-salary" placeholder=" Enter Salary" required> <br><br>

        <label for="company-name"> Company Name: </label>
        <input type="text" id="company-name" name="company-name" placeholder="Enter Company Name" required> <br><br>

        </fieldset>

        <fieldset>
        <legend> Job Details </legend>

        <label for="status"> Job Status: </label>
        <select id="status" name="status" required>
            <option value="open"> Open</option>
            <option value="closed"> Closed</option>
        </select> <br><br>

        <label for="job-description"> Job Description: </label>
        <textarea id="job-description" name="job-description" rows="5" cols="50" placeholder="Enter Job Description" required></textarea> <br><br>
        
        <label for="experience"> Years of Experience: </label>
        <input type="number" id="experience" name="experience" placeholder="e.g. 2" required> <br><br>

        </fieldset>

        <fieldset>
        <legend> Admin Information </legend>
        <label for="creator"> Created By Logged-in Admin</label>
        <input type="text" id="creator" name="creator" placeholder="Enter Admin Name" required> <br><br>

        </fieldset>

    <button type="submit"> Add Job </button>
    </form>

</body>
</html>
