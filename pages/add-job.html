<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>
    <link rel="stylesheet" href="../StyleSheet.css" >

</head>
<body class="add-job">
    <nav class="navbar">
        <div class="logo"><span>JOB</span>BITER</div>
        <ul class="navLinks">
            <li><a href="dashboard.html"> My Jobs </a></li>
            <li><a href="add-job.html"> Post a Job </a></li>
            <li><a href="home.html"> Logout </a></li>
        </ul>
    </nav>
    <h1 id="myH"> Add / Edit a Job </h1>
    <p id="myP"> Company admins can use this form to add a new job or edit an existing one. </p>

    
    <!-- When the admin clicks "Add Job", the form submits the job data
    and redirects to the dashboard page.

    In next phase using JavaScript the submitted job will be saved and displayed in the dashboard job list. -->
    

    <form action="dashboard.html" method="Post">
        <fieldset>

        <legend> Job Information </legend>

        <label for="job-id"> Job ID: </label>
        <input type="number" id="job-id" name="job-id" placeholder="Enter Job ID" required> <br><br>

        <label for="job-title"> Job Title: </label>
        <input type="text" id="job-title" name="job-title" placeholder="e.g. Software Engineer" required> <br><br>

        <label for="job-type"> Job Type: </label>
        <select id="job-type" name="job-type" required>
            <option value="full-time"> Full-time</option>
            <option value="part-time"> Part-time</option>
            <option value="remote"> Remote</option>
        </select> <br><br>

        <label for="category"> Job Category: </label>
        <input type="text" id="category" name="category" placeholder="e.g. IT, Marketing" required> <br><br>

        </fieldset>

        <fieldset>
        <legend> Job Details </legend>

        <label for="status"> Job Status: </label>
        <select id="status" name="status" required>
            <option value="open"> Open</option>
            <option value="closed"> Closed</option>
        </select> <br><br>

        <label for="job-description"> Job Description: </label>
        <textarea id="job-description" name="job-description" rows="5" cols="50" placeholder="Enter Job Description" required></textarea> <br><br>

        <label for="job-salary"> Salary: </label>
        <input type="number" id="job-salary" name="job-salary" placeholder=" Enter Salary" required> <br><br>

        </fieldset>

        <fieldset>
        <legend> Job Requirements </legend>

        <label for="education"> Education Level: </label>
        <select id="education" name="education" required>
            <option value="high-school"> High School</option>
            <option value="diploma"> Diploma</option>
            <option value="bachelor"> Bachelor’s Degree</option>
            <option value="master"> Master’s Degree</option>
            <option value="phd"> PhD</option>
            <option value="other"> Other</option>
        </select> <br><br>

        <label for="experience"> Years of Experience: </label>
        <input type="number" id="experience" name="experience" placeholder="e.g. 2" required> <br><br>

        <label for="gender"> Preferred Gender: </label>
        <select id="gender" name="gender" required>
            <option value="male"> Male</option>
            <option value="female"> Female</option>
            <option value="any"> Any</option>
        </select> <br><br>

        <label for="tech-skills"> Technical Skills: </label>
        <input type="text" id="tech-skills" name="tech-skills" placeholder="e.g. HTML, CSS, Python, JavaScript" required> <br><br>

        <label for="soft-skills"> Soft Skills: </label>
        <input type="text" id="soft-skills" name="soft-skills" placeholder="e.g. Communication, Teamwork, Problem-solving" required> <br><br>

        </fieldset>

        <fieldset>
        <legend> Job Benefits </legend>

        <label for="benefits"> Benefits: </label>
        <textarea id="benefits" name="benefits" rows="5" cols="50" placeholder="e.g. Health Insurance, Retirement Plan, Flexible Working Hours, Professional Development" required></textarea> <br><br>
        
        </fieldset>

        <fieldset>
        <legend> Company Information </legend>

        <label for="company-name"> Company Name: </label>
        <input type="text" id="company-name" name="company-name" placeholder="Enter Company Name" required> <br><br>

        <label for="industry"> Industry: </label>
        <input type="text" id="industry" name="industry" placeholder="e.g. IT, Marketing" required> <br><br>

        <label for="company-size"> Company Size: </label>
        <input type="number" id="company-size" name="company-size" placeholder="e.g. 50" required> <br><br>

        <label for="location"> Location: </label>
        <input type="text" id="location" name="location" placeholder="Enter Job Location" required> <br><br>


        
        </fieldset>

        <fieldset>
        <legend> Admin Information </legend>
        <label for="creator"> Created By Admin: </label>
        <input type="text" id="creator" name="creator" placeholder="Enter Admin Name" required> <br><br>

        </fieldset>

    <button type="submit"> Add Job </button>
    <button type="reset"> Reset Form </button>
    </form>

</body>
</html>
