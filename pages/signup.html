<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign Up - Jobbiter </title>
    <link rel="stylesheet" href="../StyleSheet.css" >
</head>

<body class="Sign-Up">
    <nav class="navbar">
  <div class="logo"><span>JOB</span>BITER</div>
       <ul class="navLinks">
          <li> <a href="home.html"> Home Page </a> </li>
          <li><a href="guestBrowse.html"> Browse Jobs </a></li>
          <li><a href="login.html"> Login </a></li>
          <li><a href="signup.html"> Sign Up </a></li>
       </ul>
 </nav>
    <div class="container">
        <h2 class="form-title"> Create an Account </h2>

        <form id="signupForm" action="#" method="POST">

            <label for="username"> Username: </label> <br>
            <input type="text" id="username" name="username"/> <br><br>

            <label for="password"> Password: </label> <br>
            <input type="password" id="password" name="password"> <br><br>

            <label for="confirm_password"> Confirm Password: </label> <br>
            <input type="password" id="confirm_password" name="confirm_password"> <br><br>

            <label for="email"> Email: </label> <br>
            <input type="email" id="email" name="email" > <br><br>

            <label> Account Type: </label> <br>

            <label for="company_radio"> Company Admin </label>
            <input type="radio" name="account_type" value="company" id="company_radio">
           

            <div class="company_name_field">
                <label for="company_name"> Company Name: </label> <br>
                <input type="text" id="company_name" name="company_name"> <br><br>

            </div>
            <label for="user_radio"> Normal User </label>
            <input type="radio" name="account_type" value="user" id="user_radio">
            


            <button type="submit"> Sign Up </button>
        </form>
        <p> Already have an account? <a href="login.html"> Log in </a> </p>

    </div>

    <script src="../JavaScript/script.js"></script>


</body>

</html>
