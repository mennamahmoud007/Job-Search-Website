<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sign Up </title>
    <link rel="stylesheet" href="../StyleSheet.css" >
</head>

<body class="Sign-Up">
    <nav class="navbar">
  <div class="logo">DAWAM</div>
       <ul class="navLinks">
          <li> <a href="home.html"> Home Page </a> </li>
          <li><a href="guestBrowse.html"> Browse Jobs </a></li>
          <li><a href="login.html"> Login </a></li>
          <li><a href="signup.html" class="active"> Sign Up </a></li>
       </ul>
 </nav>
    <div class="container">
        <h1 class="form-title"> Create Account </h1>
        <p class="myP"> Join JobBiter and start your journey</p>

        <form id="signupForm" action="#" method="POST">

            <label for="username"> Username: </label> <br>
            <input type="text" id="username" name="username" placeholder="John Doe" required/> <br><br>

            <label for="email"> Email Address: </label> <br>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com" required/> <br><br>
            

            <label for="password"> Password: </label> <br>
            <input type="password" id="password" name="password" minlength="8" placeholder="••••••••" required> <br><br>

            <label for="confirm_password"> Confirm Password: </label> <br>
            <input type="password" id="confirm_password" name="confirm_password" minlength="8" placeholder="••••••••" required> <br><br>
            <div class="error-message" id="confirmPasswordError"></div>
            
            <div class="checkbox-group"> 
                <input type="checkbox" name="account_type" value="company" id="company_check">
                <label for="company_check">
                    I am signing up as a company to post jobs
                </label> 
            </div>

            <div class="company_name_field">
                <label for="company_name"> Company Name: </label> <br>
                <input type="text" id="company_name" name="company_name" placeholder="Acme Corporation"> <br><br>
            </div>

            <button type="submit"> Sign Up </button>
          
        </form>
        <p> Already have an account? <a href="login.html"> Log in </a> </p>
        <div id="signupSuccess" class="success-message"></div>
    </div>

    <script src="../JavaScript/signup-script.js"></script>

</body>

</html>
