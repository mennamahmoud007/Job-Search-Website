<!DOCTYPE html>
<html>
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../StyleSheet.css">
</head>
 
<body class="dashboard-body">
 
    <nav class="navbar">
        <div class="logo"><span>JOB</span>BITER</div>
        <ul class="navLinks">
            <li><a href="dashboard.html" class="active">My Jobs</a></li>
            <li><a href="add-job.html">Post a Job</a></li>
            <li><a href="home.html">Logout</a></li>
        </ul>
    </nav>

    <div class="dashboard-header">
        <h1 id="dashboard-title">Welcome to Your Dashboard</h1>
        <p>Manage your jobs: edit, delete, or add new positions</p>
    </div>
 
    <div class="stats-bar">
        <div class="stat-card">
            <h3>TOTAL JOBS</h3>
            <p id="stat-total">0</p>
        </div>
        <div class="stat-card">
            <h3>OPEN JOBS</h3>
            <p id="stat-open">0</p>
        </div>
        <div class="stat-card">
            <h3>TOTAL APPLICATIONS</h3>
            <p id="stat-apps">0</p>
        </div>
        <div class="stat-card">
            <h3>PENDING REVIEW</h3>
            <p id="stat-pending">0</p>
        </div>
    </div>
 
    <br><br>
 
    <div class="jobs-section">
        <h2>Your Jobs</h2>
         <br>
        <div class="jobs-grid">
            <!-- Cards will be put in admin-dashboard.js file -->
        </div>
    </div>
 
    <br><br>
 
    <div class="add-job-row">
        <a href="add-job.html"><button><b>+ Add New Job</b></button></a>
   </div>
    <br><br>
 
    <script src="../JavaScript/admin-dashboard.js"></script>
 
</body>
</html>
